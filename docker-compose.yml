services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barhopping
      POSTGRES_USER: barhopping
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barhopping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://barhopping:${DB_PASSWORD}@db/barhopping
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://barhopping:${DB_PASSWORD}@db/barhopping
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENROUTER_ENABLED: ${OPENROUTER_ENABLED:-false}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_PDF_ENGINE: ${OPENROUTER_PDF_ENGINE:-mistral-ocr}
      OPENROUTER_PDF_PAGES_PER_CHUNK: ${OPENROUTER_PDF_PAGES_PER_CHUNK:-8}
      OPENROUTER_PDF_CHUNK_OVERLAP: ${OPENROUTER_PDF_CHUNK_OVERLAP:-0}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-32768}
      OPENROUTER_MAX_CONCURRENCY: ${OPENROUTER_MAX_CONCURRENCY:-3}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

{% set pct = (current * 100 / total) if total else 0 %}
<div
  id="sync-status"
  hx-get="/s/{{ uuid }}/sync-status"
  hx-trigger="every 2s"
  hx-swap="outerHTML"
>
  <div class="flex items-center justify-center gap-3 mb-4">
    <svg class="animate-spin h-5 w-5 text-brand" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
    </svg>
    <p class="text-gray-700 text-sm">{{ message }}</p>
  </div>
  {% if total %}
  <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
    <div class="bg-brand h-2 transition-all duration-300" style="width: {{ pct }}%"></div>
  </div>
  <p class="text-xs text-gray-400 mt-2">{{ current }} of {{ total }}</p>
  {% endif %}
</div>
